<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - IronCore Gym</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #3CB043;
    }

    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      gap: 20px;
    }

    .tabs button {
      background-color: #3CB043;
      border: none;
      padding: 10px 20px;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .tabs button.active {
      background-color: #2f9035;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #444;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #222;
    }

    tr:nth-child(even) {
      background-color: #1a1a1a;
    }

    .delete-btn {
      background-color: #c0392b;
      border: none;
      padding: 5px 10px;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }

    .delete-btn:hover {
      background-color: #a93226;
    }
  </style>
</head>
<body>

  <h1>Trainer Hours & Bookings</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('hours')">Trainer Hours</button>
    <button class="tab-btn" onclick="showTab('bookings')">Trainer Bookings</button>
  </div>

  <div id="hours" class="tab-content active">
    <h2>Trainer Hours</h2>
    <table>
      <thead>
        <tr>
          <th>Trainer</th>
          <th>Email</th>
          <th>Date</th>
          <th>Hours</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="hoursTableBody"></tbody>
    </table>
  </div>

  <div id="bookings" class="tab-content">
    <h2>Trainer Bookings</h2>
    <table>
      <thead>
        <tr>
          <th>Trainer</th>
          <th>Trainer Email</th>
          <th>Customer</th>
          <th>Customer Email</th>
          <th>Booked At</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="bookingsTableBody"></tbody>
    </table>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCMAlj_xlSoyIXtsuzNYxOxH1cQ9Fpr97I",
      authDomain: "ironcoregym-228af.firebaseapp.com",
      projectId: "ironcoregym-228af",
      storageBucket: "ironcoregym-228af.appspot.com",
      messagingSenderId: "1050936195293",
      appId: "1:1050936195293:web:8bef21a268db39ce7a0334"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Tab switcher
    window.showTab = function(tabId) {
      document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      document.getElementById(tabId).classList.add("active");
      event.target.classList.add("active");
    };

    // Load Trainer Hours
    async function loadTrainerHours() {
      const table = document.getElementById("hoursTableBody");
      table.innerHTML = "";
      const snapshot = await getDocs(collection(db, "trainerHours"));

      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${data.trainerName}</td>
          <td>${data.trainerEmail}</td>
          <td>${data.date}</td>
          <td>${data.hours}</td>
          <td><button class="delete-btn" onclick="deleteDocEntry('trainerHours', '${docSnap.id}')">Delete</button></td>
        `;
        table.appendChild(row);
      });
    }

    // Load Trainer Bookings
    async function loadTrainerBookings() {
      const table = document.getElementById("bookingsTableBody");
      table.innerHTML = "";
      const snapshot = await getDocs(collection(db, "trainerBookings"));

      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const dateStr = data.bookedAt?.toDate?.().toLocaleString() ?? "N/A";
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${data.trainerName}</td>
          <td>${data.trainerEmail}</td>
          <td>${data.customerName}</td>
          <td>${data.customerEmail}</td>
          <td>${dateStr}</td>
          <td><button class="delete-btn" onclick="deleteDocEntry('trainerBookings', '${docSnap.id}')">Delete</button></td>
        `;
        table.appendChild(row);
      });
    }

    // Delete function
    window.deleteDocEntry = async function(collectionName, docId) {
      if (confirm("Are you sure you want to delete this entry?")) {
        await deleteDoc(doc(db, collectionName, docId));
        if (collectionName === "trainerHours") loadTrainerHours();
        if (collectionName === "trainerBookings") loadTrainerBookings();
      }
    };

    // Initial load
    loadTrainerHours();
    loadTrainerBookings();
  </script>
<!-- Chat Button and Popup -->
<button id="open-chat-btn" aria-label="Open Chat">💬</button>
<div id="chat-popup">
  <div id="chat-popup-header">Chat with Admin</div>
  <button id="close-chat-btn" aria-label="Close Chat">✖️</button>
  <div id="chat-messages"></div>
  <div id="chat-input-wrapper">
    <input type="text" id="chat-input" placeholder="Type your message...">
    <button id="chat-send">Send</button>
  </div>
</div>

<!-- Script -->
<script>
const isAdmin = window.location.pathname.includes('admin');
const chatDataKey = 'ironcore_chat_messages';

function getMessages() {
  return JSON.parse(localStorage.getItem(chatDataKey) || '[]');
}

function saveMessage(sender, text) {
  const messages = getMessages();
  messages.push({ sender, text, time: new Date().toISOString() });
  localStorage.setItem(chatDataKey, JSON.stringify(messages));
}

function renderMessages(container) {
  container.innerHTML = '';
  const messages = getMessages();
  messages.forEach(({ sender, text }) => {
    const div = document.createElement('div');
    div.className = 'message ' + sender;
    div.textContent = text;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

function sendMessage(sender, inputId, container) {
  const input = document.getElementById(inputId);
  const text = input.value.trim();
  if (!text) return;
  saveMessage(sender, text);
  input.value = '';
  renderMessages(container);
}

function setupChat() {
  const openBtn = document.getElementById('open-chat-btn');
  const popup = document.getElementById('chat-popup');
  const sendBtn = document.getElementById('chat-send');
  const input = document.getElementById('chat-input');
  const messagesBox = document.getElementById('chat-messages');
  const closeBtn = document.getElementById('close-chat-btn');

  // Toggle open/close
  if (openBtn && popup) {
    openBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      popup.style.display = popup.style.display === 'flex' ? 'none' : 'flex';
      renderMessages(messagesBox);
    });
  }

  // Send on click or Enter
  if (sendBtn && input) {
    sendBtn.addEventListener('click', () => {
      sendMessage(isAdmin ? 'admin' : 'guest', 'chat-input', messagesBox);
    });

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage(isAdmin ? 'admin' : 'guest', 'chat-input', messagesBox);
      }
    });
  }

  // Close button in chat
  if (closeBtn && popup) {
    closeBtn.addEventListener('click', () => {
      popup.style.display = 'none';
    });
  }

  // Close when clicking outside
  document.addEventListener('click', (e) => {
    if (popup && !popup.contains(e.target) && e.target !== openBtn) {
      popup.style.display = 'none';
    }
  });

  renderMessages(messagesBox);
}

document.addEventListener('DOMContentLoaded', setupChat);
</script>

</body>
</html>
